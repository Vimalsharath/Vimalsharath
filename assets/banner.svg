010101001011010101001010101001101010100101010100101010101010100101010

<animate attributeName="y" values="-20;320" dur="10s" repeatCount="indefinite"/>

</text>

<text x="250" y="0" fill="#00ff41" font-size="18" font-family="monospace">

1110101010100101010100101010101010010101010101010010101010101001

<animate attributeName="y" values="-80;320" dur="8s" repeatCount="indefinite"/>

</text>

<text x="500" y="-50" fill="#00ff41" font-size="18" font-family="monospace">

010101010101001010101010010101001010100101010100101010010101001

<animate attributeName="y" values="-100;340" dur="12s" repeatCount="indefinite"/>

</text>

<text x="760" y="-40" fill="#00ff41" font-size="18" font-family="monospace">

1010101010010101001010101010010101001010101010100101010101010010

<animate attributeName="y" values="-50;330" dur="9s" repeatCount="indefinite"/>

</text>

<text x="1000" y="-30" fill="#00ff41" font-size="18" font-family="monospace">

010101010100101010101001010101010010101010100101010100101010

<animate attributeName="y" values="-30;340" dur="11s" repeatCount="indefinite"/>

</text>

</g>

<line x1="80" y1="70" x2="1120" y2="70" stroke="#00ff41" stroke-width="2"/>

<line x1="80" y1="230" x2="1120" y2="230" stroke="#00ff41" stroke-width="2"/>

<text
x="600"
y="135"
text-anchor="middle"
