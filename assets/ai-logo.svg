<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">

  <defs>

    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="220" height="220" rx="30" fill="#000"/>

  <circle cx="110" cy="110" r="75"
          stroke="url(#g1)"
          stroke-width="4"
          fill="none"
          filter="url(#glow)"/>

  <circle cx="110" cy="70" r="8" fill="#00ff41"/>
  <circle cx="70" cy="120" r="8" fill="#00ff41"/>
  <circle cx="150" cy="120" r="8" fill="#00ff41"/>
  <circle cx="90" cy="155" r="8" fill="#00ff41"/>
  <circle cx="130" cy="155" r="8" fill="#00ff41"/>

  <line x1="110" y1="70" x2="70" y2="120"
        stroke="#00ff41"
        stroke-width="3"/>

  <line x1="110" y1="70" x2="150" y2="120"
        stroke="#00ff41"
        stroke-width="3"/>

  <line x1="70" y1="120" x2="90" y2="155"
        stroke="#00ff41"
        stroke-width="3"/>

  <line x1="150" y1="120" x2="130" y2="155"
        stroke="#00ff41"
        stroke-width="3"/>

  <line x1="90" y1="155" x2="130" y2="155"
        stroke="#00ff41"
        stroke-width="3"/>

  <text
    x="110"
    y="205"
    text-anchor="middle"
    fill="#00ff41"
    font-size="20"
    font-family="Orbitron,Arial"
    font-weight="bold">

    AI

  </text>

</svg>